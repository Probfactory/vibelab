<body>

<div id="nav-container"></div>

<section class="project-detail">
  <div class="container">
    <!-- Loading State -->
    <div id="project-loading" class="loading-spinner" style="padding: 80px 0;"><div class="spinner"></div></div>

    <!-- Project Content (hidden until loaded) -->
    <div id="project-content" style="display: none;">
      <!-- Title Row: Title left, Live Demo right -->
      <div class="project-title-row">
        <h1 class="project-title" id="project-title"></h1>
        <div class="project-title-actions" id="project-title-actions"></div>
      </div>

      <!-- Full-width Preview Image -->
      <div class="project-preview-full" id="project-preview"></div>

      <!-- Action Bar: Author left, Icons right -->
      <div class="project-action-bar">
        <div class="project-author-bar" id="project-author-bar">
          <div class="loading-spinner" style="padding:0;"><div class="spinner" style="width:20px;height:20px;"></div></div>
        </div>
        <div class="project-icon-actions" id="project-icon-actions"></div>
      </div>

      <!-- Meta Tags -->
      <div class="project-meta" id="project-meta" style="margin-top: 20px;"></div>

      <!-- Description -->
      <div class="project-description" id="project-desc"></div>

      <!-- Tools & Stack -->
      <div class="project-stack" id="project-stack"></div>

      <!-- Tags -->

      <!-- Guest CTA (shown only to logged-out users) -->
      <div class="guest-cta-box" id="guest-cta" style="display: none;">
        <div class="guest-cta-content">
          <h3>Sign up to vibe with this creator</h3>
          <p>Join VibeLab to like, comment, save projects, and connect with creative developers.</p>
          <button class="btn btn-primary" onclick="openAuthModal('signup')">Join VibeLab</button>
        </div>
      </div>

      <!-- Comments Section -->
      <div class="comments-section">
        <h3 id="comments-title">Comments</h3>

        <!-- Comment Input -->
        <div class="comment-input-area" id="comment-input-area">
          <div class="comment-avatar" id="comment-user-avatar" style="background: var(--purple);">?</div>
          <div class="comment-input-wrapper">
            <textarea id="comment-text" placeholder="Share your thoughts..." rows="1" onfocus="showCommentActions()" oninput="autoResizeTextarea(this)"></textarea>
            <div class="comment-input-actions" id="comment-actions">
              <button class="comment-post-btn" onclick="postComment()" id="post-comment-btn" disabled>Post</button>
            </div>
          </div>
        </div>

        <!-- Comments List -->
        <div id="comments-list">
          <div class="loading-spinner"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- Creator Footer -->
      <div class="creator-footer" id="creator-footer"></div>
    </div>

    <!-- Live Demo Modal -->
    <div class="demo-modal-overlay" id="demo-modal">
      <div class="demo-modal">
        <div class="demo-modal-header">
          <span class="demo-modal-url" id="demo-modal-url"></span>
          <button class="demo-modal-close" onclick="closeDemoModal()" title="Close">&times;</button>
        </div>
        <iframe class="demo-modal-iframe" id="demo-modal-iframe" src="" frameborder="0" allowfullscreen></iframe>
      </div>
    </div>

</section>

<div id="footer-container"></div>
<div id="modals-container"></div>

<script>
initPage('project');

let projectData = null;
let projectId = getUrlParam('id');
let replyingTo = null;

// SVG icons (matching feed card style)
const saveIconSVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>`;
const shareIconSVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>`;

// Load project
async function loadProject() {
  if (!projectId) {
    document.getElementById('project-loading').innerHTML = '<div class="empty-state"><h3>Project not found</h3><p>The project you\'re looking for doesn\'t exist.</p><br><a href="feed.html" class="btn btn-primary btn-sm">Back to Explore</a></div>';
    return;
  }

  // Check sample projects first
  const sample = sampleProjects.find(p => p.id === projectId);
  if (sample) {
    projectData = sample;
    renderProject();
    renderSampleCreator();
    renderSampleComments();
    return;
  }

  // Load from Firestore
  try {
    const doc = await db.collection('projects').doc(projectId).get();
    if (!doc.exists) {
      document.getElementById('project-loading').innerHTML = '<div class="empty-state"><h3>Project not found</h3><p>This project may have been removed.</p><br><a href="feed.html" class="btn btn-primary btn-sm">Back to Explore</a></div>';
      return;
    }
    projectData = { id: doc.id, ...doc.data() };
    if (projectData.createdAt && projectData.createdAt.toDate) {
      projectData.createdAt = projectData.createdAt.toDate();
    }
    renderProject();
    loadCreator();
    loadComments();
  } catch (e) {
    console.error('Load project error:', e);
    document.getElementById('project-loading').innerHTML = '<div class="empty-state"><h3>Error loading project</h3><p>' + e.message + '</p></div>';
  }
}

function renderProject() {
  document.title = projectData.name + ' — VibeLab';
  document.getElementById('project-loading').style.display = 'none';
  document.getElementById('project-content').style.display = 'block';

  // Title (above image)
  document.getElementById('project-title').textContent = projectData.name;

  // Top-right buttons (Live Demo + GitHub) above image
  const titleActions = document.getElementById('project-title-actions');

  if (hasDemo) {
    titleBtns += `<button class="demo-btn-inline" onclick="openDemoModal('${projectData.link.replace(/'/g, "\\'")}')"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg> Live Demo</button>`;
  }

    titleBtns += `<a href="${projectData.githubUrl}" target="_blank" rel="noopener noreferrer" class="project-secondary-link"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg> GitHub</a>`;
  }
  if (projectData.figmaUrl && (projectData.figmaUrl.startsWith('http://') || projectData.figmaUrl.startsWith('https://'))) {
    titleBtns += `<a href="${projectData.figmaUrl}" target="_blank" rel="noopener noreferrer" class="project-secondary-link"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M15.852 8.981h-4.588V0h4.588c2.476 0 4.49 2.014 4.49 4.49s-2.014 4.491-4.49 4.491zM12.735 7.51h3.117c1.665 0 3.019-1.355 3.019-3.019s-1.355-3.019-3.019-3.019h-3.117V7.51zM8.148 24c-2.476 0-4.49-2.014-4.49-4.49s2.014-4.49 4.49-4.49h4.588v4.441c0 2.503-2.014 4.539-4.588 4.539zm-.001-7.509c-1.665 0-3.019 1.355-3.019 3.019s1.355 3.019 3.019 3.019c1.665 0 3.118-1.312 3.118-2.978v-3.06H8.147zM8.148 15.02H3.559c-2.476 0-4.49-2.014-4.49-4.49s2.014-4.49 4.49-4.49h4.588v8.981H8.148zm-.001-7.51H3.559c-1.665 0-3.019 1.355-3.019 3.019s1.355 3.019 3.019 3.019h4.588V7.51zM8.148 0H3.559c-2.476 0-4.49 2.014-4.49 4.49s2.014 4.49 4.49 4.49h4.588V0H8.148zM3.559 7.51c-1.665 0-3.019-1.355-3.019-3.019S1.894 1.472 3.559 1.472h3.118V7.51H3.559zM15.852 15.02h-3.117v-6.04h3.117c1.665 0 3.019 1.355 3.019 3.019s-1.355 3.021-3.019 3.021zm0-4.57c-.821 0-1.548.727-1.548 1.548 0 .821.727 1.548 1.548 1.548.822 0 1.548-.727 1.548-1.548 0-.821-.727-1.548-1.548-1.548z"/></svg> Figma</a>`;
  }
  titleActions.innerHTML = titleBtns;

  // Preview (full-width)
  const preview = document.getElementById('project-preview');
  if (projectData.imageURL) {
    const img = document.createElement('img');
    img.src = projectData.imageURL;
    img.alt = projectData.name || '';
    preview.appendChild(img);
  } else {
    preview.style.background = projectData.gradient || 'var(--bg-alt)';
    preview.style.minHeight = '360px';
  }

  // Icon action buttons (Time, Vibe, Comments, More menu) — right side of action bar
  const commentIconSVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`;
  const moreIconSVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>`;
  const iconActions = document.getElementById('project-icon-actions');
  const timeStr = projectData.createdAt ? timeAgo(projectData.createdAt) : '';
  iconActions.innerHTML = `
    ${timeStr ? '<span class="action-bar-time">' + timeStr + '</span>' : ''}
    <button class="project-icon-btn" id="vibe-btn" onclick="handleVibe()">
      ${vibeIconSVG} <span class="count">${projectData.vibes || 0}</span>
    </button>
    <button class="project-icon-btn" onclick="document.getElementById('comments-title').scrollIntoView({behavior:'smooth'})">
      ${commentIconSVG} <span class="count">${projectData.comments || 0}</span>
    </button>
    <div class="more-menu-wrap">
      <button class="project-icon-btn" onclick="toggleMoreMenu(event)">
        ${moreIconSVG}
      </button>
      <div class="more-menu" id="more-menu">
        <button class="more-menu-item" onclick="openSaveModal('${projectData.id}'); closeMoreMenu();">${saveIconSVG} Save</button>
        <button class="more-menu-item" onclick="shareProject(); closeMoreMenu();">${shareIconSVG} Share</button>
      </div>
    </div>
  `;

  // Check if user has vibed
  if (currentUser && projectData.id && !projectData.id.startsWith('sample')) {
    checkIfVibed(projectData.id).then(vibed => {
      if (vibed) document.getElementById('vibe-btn')?.classList.add('active');
    });
  }

  // Meta (category only)
  const meta = document.getElementById('project-meta');
  meta.innerHTML = `
    <span class="card-tag ${tagClasses[projectData.category]}">${projectData.tag || tagMap[projectData.category]}</span>
  `;

  // Description
  document.getElementById('project-desc').textContent = projectData.desc;

  // Tools & Stack (derived from tags + status)
  const stack = document.getElementById('project-stack');
  const allTags = projectData.tags || [];
  const hasStatus = !!projectData.status;
  if (allTags.length > 0 || hasStatus) {
    let chipsHtml = '';
    if (hasStatus) {
      chipsHtml += '<span class="stack-chip stack-chip-status">' + escapeHtml(projectData.status) + '</span>';
    }
    chipsHtml += allTags.map(t => '<span class="stack-chip">' + escapeHtml(t) + '</span>').join('');
    stack.innerHTML = '<h4 class="stack-title">Tools & Stack</h4><div class="stack-chips">' + chipsHtml + '</div>';
  }

  // Tags (category/status)
  const tags = document.getElementById('project-tags');
  tags.innerHTML = '';

  // Guest CTA - defer to authStateReady to avoid flash
}

async function loadCreator() {
  const authorBar = document.getElementById('project-author-bar');
  const footer = document.getElementById('creator-footer');

  if (!projectData.authorUid) {
    authorBar.innerHTML = '<span style="color: var(--text-muted);">Unknown creator</span>';
    footer.innerHTML = '';
    return;
  }

  try {
    const userDoc = await db.collection('users').doc(projectData.authorUid).get();
    const profile = userDoc.exists ? userDoc.data() : null;
    const isFollowing = await checkIfFollowing(projectData.authorUid);
    const isOwn = currentUser && currentUser.uid === projectData.authorUid;

    const displayName = profile?.displayName || projectData.authorName || projectData.author || 'Creator';
    const initial = displayName[0].toUpperCase();
    const profileUrl = getProfileUrl(profile?.username || projectData.authorUsername, projectData.authorUid);
    const avatarBg = projectData.color || 'var(--purple)';
    const avatarContent = profile?.photoURL ? '<img src="' + profile.photoURL + '">' : initial;

    // Author bar (below image, left side)
    authorBar.innerHTML = `
      <a href="${profileUrl}" style="text-decoration:none;">
        <div class="author-avatar" style="background: ${avatarBg};">${avatarContent}</div>
      </a>
      <a href="${profileUrl}" class="author-name">${escapeHtml(displayName)}</a>
      ${!isOwn ? '<button class="follow-btn-sm ' + (isFollowing ? 'following' : 'not-following') + '" id="follow-btn" onclick="handleFollow()">' + (isFollowing ? 'Following' : 'Follow') + '</button>' : ''}
    `;

    // Creator footer (below comments)
    footer.innerHTML = `
      <a href="${profileUrl}" style="text-decoration:none;">
        <div class="footer-avatar" style="background: ${avatarBg};">${avatarContent}</div>
      </a>
      <div class="footer-info">
        <a href="${profileUrl}">${escapeHtml(displayName)}</a>
        <p>Thanks for checking out this project!</p>
      </div>
    `;
  } catch (e) {
    console.error('Load creator error:', e);
    authorBar.innerHTML = '<span style="color: var(--text-muted);">Creator info unavailable</span>';
    footer.innerHTML = '';
  }
}

  const authorBar = document.getElementById('project-author-bar');
  const footer = document.getElementById('creator-footer');
  const name = projectData.author || 'Creator';
  const initial = name[0].toUpperCase();
  const avatarBg = projectData.color || 'var(--purple)';

  authorBar.innerHTML = `
    <div class="author-avatar" style="background: ${avatarBg};">${initial}</div>
    <span class="author-name">${escapeHtml(name)}</span>
    <button class="follow-btn-sm not-following" onclick="requireAuth('follow creators')">Follow</button>
  `;

  footer.innerHTML = `
    <div class="footer-avatar" style="background: ${avatarBg};">${initial}</div>
    <div class="footer-info">
      <a href="#">${escapeHtml(name)}</a>
      <p>Thanks for checking out this project!</p>
    </div>
  `;
}

    { author: 'vibeSeeker', body: 'Just tried it out. The experience is so smooth. Great work!', time: '5d ago', color: '#10b981' }

  list.innerHTML = sampleComments.map(c => `
    <div class="comment-thread">

        <div class="comment-avatar" style="background: ${c.color};">${c.author[0].toUpperCase()}</div>
        <div class="comment-content">
          <div class="comment-header">
            <span class="comment-author">${c.author}</span>
            <span class="comment-time">${c.time}</span>
          </div>
          <div class="comment-body">${c.body}</div>
          <div class="comment-actions">
            <div class="comment-reactions">
              <button class="reaction-btn" onclick="requireAuth('react to comments')" title="Fire">&#128293;</button>
              <button class="reaction-btn" onclick="requireAuth('react to comments')" title="Love">&#10084;&#65039;</button>
              <button class="reaction-btn" onclick="requireAuth('react to comments')" title="Sparkles">&#10024;</button>
              <button class="reaction-btn" onclick="requireAuth('react to comments')" title="Rocket">&#128640;</button>
            </div>
            <button class="comment-action" onclick="requireAuth('reply to comments')">Reply</button>
          </div>
        </div>
      </div>
      ${c.replies ? '<div class="comment-replies">' + c.replies.map(r => `
        <div class="comment">
          <div class="comment-avatar" style="background: ${r.color};">${r.author[0].toUpperCase()}</div>
          <div class="comment-content">
            <div class="comment-header">
              <span class="comment-author">${r.author}</span>
              <span class="comment-time">${r.time}</span>
            </div>
            <div class="comment-body">${r.body}</div>

  document.getElementById('comments-title').textContent = `Comments (${sampleComments.length})`;

// Load comments from Firestore
async function loadComments() {
  const list = document.getElementById('comments-list');
  try {
    const snapshot = await db.collection('projects').doc(projectId).collection('comments')
      .orderBy('createdAt', 'desc').limit(50).get();

    if (snapshot.empty) {
      list.innerHTML = '<div class="empty-state" style="padding: 30px;"><p style="color: var(--text-muted);">No comments yet. Be the first to share your thoughts!</p></div>';
      document.getElementById('comments-title').textContent = 'Comments (0)';
      return;
    }

    const comments = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    const topLevel = comments.filter(c => !c.parentId);
    const replies = comments.filter(c => c.parentId);

    let html = '';
    for (const c of topLevel) {
      const cReplies = replies.filter(r => r.parentId === c.id);
      html += renderComment(c, cReplies);
    }

    list.innerHTML = html;
    document.getElementById('comments-title').textContent = `Comments (${comments.length})`;
  } catch (e) {
    console.error('Load comments error:', e);
    list.innerHTML = '<div class="empty-state" style="padding: 30px;"><p>Could not load comments.</p></div>';
  }
}

// Reaction emojis
const reactionEmojis = [
  { emoji: '&#128293;', name: 'fire', label: 'Fire' },
  { emoji: '&#10084;&#65039;', name: 'heart', label: 'Love' },
  { emoji: '&#10024;', name: 'sparkles', label: 'Sparkles' },
  { emoji: '&#128640;', name: 'rocket', label: 'Rocket' }
];

function renderReactions(commentId, reactions) {
  const counts = {};
  reactionEmojis.forEach(r => { counts[r.name] = 0; });
  if (reactions) {
    Object.values(reactions).forEach(r => {
      if (counts[r] !== undefined) counts[r]++;
    });
  }
  const userReaction = reactions && currentUser ? reactions[currentUser.uid] : null;

  return '<div class="comment-reactions">' +
    reactionEmojis.map(r => {
      const count = counts[r.name];
      const isActive = userReaction === r.name;
      return `<button class="reaction-btn ${isActive ? 'active' : ''}" onclick="handleReaction('${commentId}', '${r.name}')" title="${r.label}">${r.emoji}${count > 0 ? ' <span class="reaction-count">' + count + '</span>' : ''}</button>`;
    }).join('') + '</div>';
}

async function handleReaction(commentId, reactionName) {
  if (!requireAuth('react to comments')) return;
  try {
    const commentRef = db.collection('projects').doc(projectId).collection('comments').doc(commentId);
    const doc = await commentRef.get();
    if (!doc.exists) return;
    const data = doc.data();
    const reactions = data.reactions || {};
    if (reactions[currentUser.uid] === reactionName) {
      delete reactions[currentUser.uid];
    } else {
      reactions[currentUser.uid] = reactionName;
    }
    await commentRef.update({ reactions });
    loadComments();
  } catch (e) {
    console.error('Reaction error:', e);
  }
}

function renderComment(c, replies = []) {
  const initial = (c.authorName || 'U')[0].toUpperCase();
  const time = c.createdAt ? timeAgo(c.createdAt.toDate ? c.createdAt.toDate() : c.createdAt) : '';

  return `
    <div class="comment-thread">
      <div class="comment">
        ${c.authorPhoto ? '<img class="comment-avatar" src="' + c.authorPhoto + '" style="width:32px;height:32px;border-radius:50%;object-fit:cover;">' : '<div class="comment-avatar" style="background: ' + (c.authorColor || 'var(--purple)') + ';">' + initial + '</div>'}
        <div class="comment-content">
          <div class="comment-header">
            <a href="${getProfileUrl(c.authorUsername, c.authorUid)}" class="comment-author" style="text-decoration:none;color:inherit;">${escapeHtml(c.authorName || 'Anonymous')}</a>
            <span class="comment-time">${time}</span>
          </div>
          <div class="comment-body">${escapeHtml(c.body)}</div>
          <div class="comment-actions">
            ${renderReactions(c.id, c.reactions)}
            <button class="comment-action" onclick="handleReply('${c.id}', '${escapeHtml(c.authorName || '')}')">Reply</button>
          </div>
        </div>
      </div>
      ${replies.length > 0 ? '<div class="comment-replies">' + replies.map(r => {
        const rInitial = (r.authorName || 'U')[0].toUpperCase();
        const rTime = r.createdAt ? timeAgo(r.createdAt.toDate ? r.createdAt.toDate() : r.createdAt) : '';
        return `
          <div class="comment">
            ${r.authorPhoto ? '<img class="comment-avatar" src="' + r.authorPhoto + '" style="width:32px;height:32px;border-radius:50%;object-fit:cover;">' : '<div class="comment-avatar" style="background: ' + (r.authorColor || 'var(--purple)') + ';">' + rInitial + '</div>'}
            <div class="comment-content">
              <div class="comment-header">
                <a href="${getProfileUrl(r.authorUsername, r.authorUid)}" class="comment-author" style="text-decoration:none;color:inherit;">${escapeHtml(r.authorName || 'Anonymous')}</a>
                <span class="comment-time">${rTime}</span>
              </div>
              <div class="comment-body">${escapeHtml(r.body)}</div>
              <div class="comment-actions">
                ${renderReactions(r.id, r.reactions)}
              </div>
            </div>
          </div>`;
      }).join('') + '</div>' : ''}
      <div class="reply-input-area" id="reply-area-${c.id}" style="display: none;">
        <div class="comment-avatar" style="background: var(--purple); width:28px; height:28px; font-size:0.65rem;">?</div>
        <div class="comment-input-wrapper" style="flex:1;">
          <textarea id="reply-text-${c.id}" placeholder="Write a reply..." rows="1" oninput="autoResizeTextarea(this)"></textarea>
          <div class="comment-input-actions show">
            <button class="comment-post-btn" onclick="postReply('${c.id}')" style="font-size:0.78rem; padding:6px 14px;">Reply</button>
          </div>
        </div>
      </div>
    </div>`;
}

// Comment actions
function showCommentActions() {
  document.getElementById('comment-actions').classList.add('show');
}

function autoResizeTextarea(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
  // Enable/disable post button
  const btn = el.closest('.comment-input-wrapper')?.querySelector('.comment-post-btn');
  if (btn) btn.disabled = !el.value.trim();
}

async function postComment() {
  if (!requireAuth('comment on projects')) return;
  const textEl = document.getElementById('comment-text');
  const body = textEl.value.trim();
  if (!body) return;

  try {
    await db.collection('projects').doc(projectId).collection('comments').add({
      body,
      authorUid: currentUser.uid,
      authorName: currentUserProfile?.displayName || currentUser.displayName || 'Anonymous',
      authorPhoto: currentUserProfile?.photoURL || '',
      authorColor: colorMap[projectData?.category] || '#7c3aed',
      parentId: null,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    await db.collection('projects').doc(projectId).update({
      comments: firebase.firestore.FieldValue.increment(1)
    });

    textEl.value = '';
    textEl.style.height = 'auto';
    loadComments();
    showToast('Comment posted!');
  } catch (e) {
    console.error('Post comment error:', e);
    showToast('Error posting comment');
  }
}

function handleReply(commentId, authorName) {
  if (!requireAuth('reply to comments')) return;
  // Toggle reply area
  const area = document.getElementById('reply-area-' + commentId);
  if (area) {
    area.style.display = area.style.display === 'none' ? 'flex' : 'none';
    const textarea = document.getElementById('reply-text-' + commentId);
    if (textarea) { textarea.focus(); textarea.placeholder = 'Reply to ' + authorName + '...'; }
  }
}

async function postReply(parentId) {
  if (!requireAuth('reply to comments')) return;
  const textEl = document.getElementById('reply-text-' + parentId);
  const body = textEl?.value.trim();
  if (!body) return;

  try {
    await db.collection('projects').doc(projectId).collection('comments').add({
      body,
      authorUid: currentUser.uid,
      authorName: currentUserProfile?.displayName || currentUser.displayName || 'Anonymous',
      authorPhoto: currentUserProfile?.photoURL || '',
      authorColor: colorMap[projectData?.category] || '#7c3aed',
      parentId,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    await db.collection('projects').doc(projectId).update({
      comments: firebase.firestore.FieldValue.increment(1)
    });

    textEl.value = '';
    loadComments();
    showToast('Reply posted!');
  } catch (e) {
    console.error('Post reply error:', e);
  }
}

// Vibe (like)
async function handleVibe() {
  if (!requireAuth('vibe with this project')) return;
  if (projectId.startsWith('sample')) {
    showToast('This is a sample project');
    return;
  }
  const btn = document.getElementById('vibe-btn');
  await toggleVibe(projectId, btn);
}

// Follow
async function handleFollow() {
  if (!requireAuth('follow creators')) return;
  const btn = document.getElementById('follow-btn');
  await toggleFollow(projectData.authorUid, btn);
}

// Share
function shareProject() {
  if (!requireAuth('share projects')) return;
  const url = window.location.href;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => showToast('Link copied to clipboard!'));
  } else {
    showToast('Share: ' + url);
  }
}

// Update comment input avatar when auth ready
window.addEventListener('authStateReady', (e) => {
  const guestCta = document.getElementById('guest-cta');
  if (e.detail.user && e.detail.profile) {
    const avatar = document.getElementById('comment-user-avatar');
    if (avatar) {
      if (e.detail.profile.photoURL) {
        avatar.innerHTML = '<img src="' + e.detail.profile.photoURL + '" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">';
      } else {
        avatar.textContent = (e.detail.profile.displayName || e.detail.user.email || 'U')[0].toUpperCase();
      }
    }
    if (guestCta) guestCta.style.display = 'none';
  } else {
    // Show guest CTA for logged-out users
    if (guestCta) guestCta.style.display = 'block';
  }
});

// Live Demo modal
function openDemoModal(url) {
  const overlay = document.getElementById('demo-modal');
  const iframe = document.getElementById('demo-modal-iframe');
  const urlDisplay = document.getElementById('demo-modal-url');
  if (!overlay || !iframe) return;
  iframe.src = url;
  if (urlDisplay) urlDisplay.textContent = url;
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDemoModal() {
  const overlay = document.getElementById('demo-modal');
  const iframe = document.getElementById('demo-modal-iframe');
  if (overlay) overlay.classList.remove('open');
  if (iframe) iframe.src = '';
  document.body.style.overflow = '';
}

// Close demo modal on backdrop click
document.addEventListener('click', (e) => {
  if (e.target === document.getElementById('demo-modal')) closeDemoModal();
});

// Close demo modal on Escape key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeDemoModal();
});

// More menu (three dots)
function toggleMoreMenu(e) {
  e.stopPropagation();
  const menu = document.getElementById('more-menu');
  if (menu) menu.classList.toggle('open');
}
function closeMoreMenu() {
  const menu = document.getElementById('more-menu');
  if (menu) menu.classList.remove('open');
}
document.addEventListener('click', () => closeMoreMenu());

// Initial load
loadProject();
</script>
