<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Vibes — VibeLab</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M74.96,1.39c-.91-.24-1.85-.37-2.78-.37-4.85,0-9.12,3.27-10.39,7.95l-5.59,20.07-5.36-19.59c-1.28-4.67-5.55-7.93-10.4-7.93-.94,0-1.87.12-2.78.37-2.78.74-5.1,2.53-6.54,5.02-1.44,2.49-1.82,5.39-1.08,8.17l4.41,16.47s-.02,0-.03,0c-3.36.87-6.01,3.3-7.27,6.39-.75.03-1.5.15-2.24.34-2.78.72-5.11,2.48-6.57,4.96-1.46,2.48-1.86,5.37-1.14,8.15l2.09,8.04s0,.03.01.05v8.26c0,17.39,14.15,31.54,31.54,31.54,2.82,0,5.62-.38,8.34-1.12.63-.15,2.54-.67,5.06-1.86.09-.04.18-.08.27-.13l.09-.05h0s0,0,0,0l.04-.02c.05-.03.1-.05.15-.08.82-.41,1.61-.84,2.34-1.28.11-.07.22-.14.32-.21.65-.41,1.29-.83,1.9-1.27,4.23-3.07,7.64-7.19,9.88-11.94.17-.25.31-.51.43-.78,1.8-4.04,2.71-8.35,2.71-12.8v-10.24c0-5.91-2.98-11.31-7.8-14.48l7.96-28.41v-.02s.01-.02.01-.02c1.53-5.73-1.88-11.64-7.61-13.17Z'/></svg>">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="nav-container"></div>

<section class="my-vibes-page">
  <div class="container">
    <!-- Header -->
    <div class="feed-header">
      <div>
        <div class="section-title" style="margin-bottom: 4px;">My Vibes</div>
        <p id="vibes-subtitle" style="color: var(--text-muted); font-size: 0.95rem;">All the projects you've shared with the community</p>
      </div>
      <button class="btn btn-primary btn-sm" onclick="openSubmitModal()">+ Share New Vibe</button>
    </div>

    <!-- Loading -->
    <div id="vibes-loading" class="loading-spinner" style="padding: 60px 0;"><div class="spinner"></div></div>

    <!-- Project Grid -->
    <div class="project-grid" id="my-vibes-grid" style="display: none;"></div>

    <!-- Empty State -->
    <div class="empty-state" id="vibes-empty" style="display: none;">
      <div class="empty-icon">&#127912;</div>
      <h3>No vibes yet</h3>
      <p>You haven't shared any projects yet. Start by sharing your first vibe!</p>
      <br>
      <button class="btn btn-primary btn-sm" onclick="openSubmitModal()">+ Share Your Vibe</button>
    </div>
  </div>
</section>

<div id="footer-container"></div>
<div id="modals-container"></div>

<!-- Core UI (no Firebase dependency) -->
<script src="js/shared.js"></script>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

<!-- App JS (depends on Firebase) -->
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>

<script>
initPage('my-vibes');

function renderVibeCard(p) {
  const authorName = p.authorName || p.author || 'Anonymous';
  const authorInitial = authorName[0] ? authorName[0].toUpperCase() : 'A';
  const cat = p.category || 'web';
  const tagLabel = p.tag || tagMap[cat] || 'Web';
  const gradient = p.gradient || gradMap[cat] || 'linear-gradient(135deg, #dbeafe, #bfdbfe, #93c5fd)';
  const cardColor = p.color || colorMap[cat] || '#3b82f6';
  const statusBadge = p.status ? `<span class="vibe-status-badge status-${p.status.toLowerCase()}">${p.status}</span>` : '';
  const visibilityBadge = p.visibility === 'unlisted' ? '<span class="vibe-visibility-badge">Unlisted</span>' : '';

  return `
    <div class="vibe-card" data-id="${p.id}">
      <a href="project.html?id=${p.id}#id=${p.id}" class="vibe-card-link">
        <div class="card-preview" style="background: ${p.imageURL ? 'url(' + p.imageURL + ') center/cover' : gradient};">
          <div class="card-gradient"></div>
          <span class="card-tag ${tagClasses[cat] || 'tag-web'}">${tagLabel}</span>
          ${p.builtWith ? '<span class="card-built-with">' + escapeHtml(p.builtWith) + '</span>' : ''}
        </div>
        <div class="card-body">
          <h3>${escapeHtml(p.name)}</h3>
          <p>${escapeHtml(p.desc)}</p>
        </div>
      </a>
      <div class="vibe-card-meta">
        <div class="vibe-card-badges">
          ${statusBadge}
          ${visibilityBadge}
        </div>
        <div class="card-stats">
          <span>&#10024; ${p.vibes || 0}</span>
          <span>&#128172; ${p.comments || 0}</span>
        </div>
      </div>
      <div class="vibe-card-actions">
        <button class="vibe-action-btn vibe-edit-btn" onclick="openEditProjectModal('${p.id}')" title="Edit project">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Edit
        </button>
        <button class="vibe-action-btn vibe-delete-btn" onclick="event.preventDefault(); deleteProject('${p.id}', '${escapeHtml(p.name).replace(/'/g, "\\'")}')" title="Delete project">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
          Delete
        </button>
      </div>
    </div>
  `;
}

async function loadMyVibes() {
  const grid = document.getElementById('my-vibes-grid');
  const loading = document.getElementById('vibes-loading');
  const empty = document.getElementById('vibes-empty');
  const subtitle = document.getElementById('vibes-subtitle');

  if (!currentUser) {
    loading.style.display = 'none';
    empty.innerHTML = '<div class="empty-icon">&#128274;</div><h3>Please log in</h3><p>You need to be logged in to see your vibes.</p><br><a href="#" class="btn btn-primary btn-sm" onclick="openAuthModal(\'login\'); return false;">Log In</a>';
    empty.style.display = 'block';
    return;
  }

  try {
    let snapshot;
    try {
      snapshot = await db.collection('projects')
        .where('authorUid', '==', currentUser.uid)
        .orderBy('createdAt', 'desc')
        .get();
    } catch (indexErr) {
      // Fallback: query without ordering if composite index doesn't exist
      console.warn('Index not ready, using fallback query:', indexErr.message);
      snapshot = await db.collection('projects')
        .where('authorUid', '==', currentUser.uid)
        .get();
    }

    loading.style.display = 'none';

    if (snapshot.empty) {
      grid.style.display = 'none';
      empty.style.display = 'block';
    } else {
      empty.style.display = 'none';
      grid.style.display = 'grid';
      const projects = snapshot.docs.map(doc => ({
        id: doc.id,
        ...doc.data(),
        createdAt: doc.data().createdAt ? doc.data().createdAt.toDate() : new Date()
      }));
      // Sort client-side as fallback
      projects.sort((a, b) => b.createdAt - a.createdAt);
      subtitle.textContent = `${projects.length} project${projects.length !== 1 ? 's' : ''} shared with the community`;
      grid.innerHTML = projects.map(p => renderVibeCard(p)).join('');
    }
  } catch (e) {
    console.error('Load my vibes error:', e);
    loading.style.display = 'none';
    grid.innerHTML = '<div class="empty-state"><h3>Error loading projects</h3><p>' + e.message + '</p></div>';
    grid.style.display = 'block';
  }
}

// Wait for auth then load
window.addEventListener('authStateReady', () => {
  loadMyVibes();
});

// Fallback load
setTimeout(() => {
  const grid = document.getElementById('my-vibes-grid');
  if (grid && grid.style.display === 'none' && document.getElementById('vibes-loading').style.display !== 'none') {
    loadMyVibes();
  }
}, 2000);
</script>
</body>
</html>
