<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile — VibeLab</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M74.96,1.39c-.91-.24-1.85-.37-2.78-.37-4.85,0-9.12,3.27-10.39,7.95l-5.59,20.07-5.36-19.59c-1.28-4.67-5.55-7.93-10.4-7.93-.94,0-1.87.12-2.78.37-2.78.74-5.1,2.53-6.54,5.02-1.44,2.49-1.82,5.39-1.08,8.17l4.41,16.47s-.02,0-.03,0c-3.36.87-6.01,3.3-7.27,6.39-.75.03-1.5.15-2.24.34-2.78.72-5.11,2.48-6.57,4.96-1.46,2.48-1.86,5.37-1.14,8.15l2.09,8.04s0,.03.01.05v8.26c0,17.39,14.15,31.54,31.54,31.54,2.82,0,5.62-.38,8.34-1.12.63-.15,2.54-.67,5.06-1.86.09-.04.18-.08.27-.13l.09-.05h0s0,0,0,0l.04-.02c.05-.03.1-.05.15-.08.82-.41,1.61-.84,2.34-1.28.11-.07.22-.14.32-.21.65-.41,1.29-.83,1.9-1.27,4.23-3.07,7.64-7.19,9.88-11.94.17-.25.31-.51.43-.78,1.8-4.04,2.71-8.35,2.71-12.8v-10.24c0-5.91-2.98-11.31-7.8-14.48l7.96-28.41v-.02s.01-.02.01-.02c1.53-5.73-1.88-11.64-7.61-13.17Z'/></svg>">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="nav-container"></div>

<section class="profile-page">
  <div class="container">
    <!-- Loading -->
    <div id="profile-loading" class="loading-spinner" style="padding: 80px 0;"><div class="spinner"></div></div>

    <!-- Profile Content -->
    <div id="profile-content" style="display: none;">
      <!-- Profile Header -->
      <div class="profile-header" id="profile-header"></div>

      <!-- Profile Tabs -->
      <div class="profile-tabs">
        <button class="profile-tab active" onclick="switchProfileTab('vibes', this)">Vibes</button>
        <button class="profile-tab" onclick="switchProfileTab('collections', this)">Collections</button>
      </div>

      <!-- Tab Content: Vibes (projects) -->
      <div id="tab-vibes">
        <div class="project-grid" id="profile-projects-grid">
          <div class="loading-spinner"><div class="spinner"></div></div>
        </div>
        <div class="empty-state" id="profile-empty" style="display: none;">
          <div class="empty-icon">&#127912;</div>
          <h3>No vibes yet</h3>
          <p>This creator hasn't shared any projects yet.</p>
        </div>
      </div>

      <!-- Tab Content: Collections -->
      <div id="tab-collections" style="display: none;">
        <div class="collections-grid" id="profile-collections-grid"></div>
        <div class="empty-state" id="collections-empty" style="display: none;">
          <div class="empty-icon">&#128278;</div>
          <h3>No collections yet</h3>
          <p>Saved vibes will appear here.</p>
        </div>
      </div>
    </div>
  </div>
</section>

<div id="footer-container"></div>
<div id="modals-container"></div>

<!-- Core UI (no Firebase dependency) -->
<script src="js/shared.js"></script>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

<!-- App JS (depends on Firebase) -->
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>

<script>
initPage('profile');

const profileUserId = getUrlParam('id');
let profileData = null;

async function loadProfile() {
  if (!profileUserId) {
    document.getElementById('profile-loading').innerHTML = '<div class="empty-state"><h3>Profile not found</h3><p>No user ID specified.</p><br><a href="feed.html" class="btn btn-primary btn-sm">Back to Explore</a></div>';
    return;
  }

  try {
    const userDoc = await db.collection('users').doc(profileUserId).get();
    if (!userDoc.exists) {
      document.getElementById('profile-loading').innerHTML = '<div class="empty-state"><h3>Profile not found</h3><p>This user doesn\'t exist.</p><br><a href="feed.html" class="btn btn-primary btn-sm">Back to Explore</a></div>';
      return;
    }

    profileData = userDoc.data();
    document.title = (profileData.displayName || 'Creator') + ' — VibeLab';

    const counts = await getFollowCounts(profileUserId);
    const isFollowing = currentUser ? await checkIfFollowing(profileUserId) : false;
    const isOwn = currentUser && currentUser.uid === profileUserId;

    // Count projects
    let projectCount = 0;
    try {
      const projSnap = await db.collection('projects').where('authorUid', '==', profileUserId).get();
      projectCount = projSnap.size;
    } catch (e) {}

    renderProfileHeader(profileData, counts, isFollowing, isOwn, projectCount);
    loadProfileProjects();

    document.getElementById('profile-loading').style.display = 'none';
    document.getElementById('profile-content').style.display = 'block';
  } catch (e) {
    console.error('Load profile error:', e);
    document.getElementById('profile-loading').innerHTML = '<div class="empty-state"><h3>Error loading profile</h3><p>' + e.message + '</p></div>';
  }
}

function renderProfileHeader(profile, counts, isFollowing, isOwn, projectCount) {
  const header = document.getElementById('profile-header');
  const name = profile.displayName || 'Creator';
  const initial = name[0].toUpperCase();

  header.innerHTML = `
    <div class="profile-avatar-lg" style="background: var(--purple);">
      ${profile.photoURL ? '<img src="' + profile.photoURL + '">' : initial}
    </div>
    <div class="profile-details">
      <div class="profile-name-row">
        <h1 class="profile-name">${escapeHtml(name)}</h1>
        ${isOwn ? '<button class="btn btn-outline btn-sm" onclick="openProfileModal()">Edit Profile</button>' :
          '<button class="follow-btn ' + (isFollowing ? 'following' : 'not-following') + '" id="profile-follow-btn" onclick="handleProfileFollow()" style="width:auto; padding: 8px 24px;">' + (isFollowing ? 'Following' : 'Follow') + '</button>'}
      </div>
      ${profile.company ? '<div class="profile-handle">' + escapeHtml(profile.company) + '</div>' : ''}
      ${profile.bio ? '<p class="profile-bio-text">' + escapeHtml(profile.bio) + '</p>' : ''}
      <div class="profile-stats">
        <span class="profile-stat"><strong>${projectCount}</strong> vibes</span>
        <span class="profile-stat"><strong>${counts.followers}</strong> followers</span>
        <span class="profile-stat"><strong>${counts.following}</strong> following</span>
      </div>
      ${(profile.skills && profile.skills.length > 0) ? '<div class="profile-skills"><span class="profile-skills-label">Skills & Interests:</span>' + profile.skills.map(s => '<span class="profile-skill-tag">' + escapeHtml(s) + '</span>').join('') + '</div>' : ''}
      <div class="profile-social-links">
        ${profile.socials?.twitter ? '<a href="https://twitter.com/' + profile.socials.twitter.replace('@', '') + '" target="_blank" class="profile-social-link">&#120143; Twitter</a>' : ''}
        ${profile.socials?.github ? '<a href="https://github.com/' + profile.socials.github + '" target="_blank" class="profile-social-link">&#128187; GitHub</a>' : ''}
        ${profile.socials?.website ? '<a href="' + profile.socials.website + '" target="_blank" class="profile-social-link">&#127760; Website</a>' : ''}
      </div>
    </div>
  `;
}

async function loadProfileProjects() {
  const grid = document.getElementById('profile-projects-grid');
  const empty = document.getElementById('profile-empty');

  try {
    const snapshot = await db.collection('projects')
      .where('authorUid', '==', profileUserId)
      .orderBy('createdAt', 'desc')
      .limit(30)
      .get();

    if (snapshot.empty) {
      grid.innerHTML = '';
      empty.style.display = 'block';
    } else {
      empty.style.display = 'none';
      const projects = snapshot.docs.map(doc => ({
        id: doc.id,
        ...doc.data(),
        createdAt: doc.data().createdAt ? doc.data().createdAt.toDate() : new Date()
      }));
      grid.innerHTML = projects.map(p => renderProjectCard(p)).join('');
    }
  } catch (e) {
    console.error('Load profile projects error:', e);
    grid.innerHTML = '';
    empty.style.display = 'block';
  }
}

async function loadProfileCollections() {
  const grid = document.getElementById('profile-collections-grid');
  const empty = document.getElementById('collections-empty');
  const isOwn = currentUser && currentUser.uid === profileUserId;

  if (!isOwn) {
    grid.innerHTML = '';
    empty.innerHTML = '<div class="empty-icon">&#128274;</div><h3>Private</h3><p>Collections are only visible to their owner.</p>';
    empty.style.display = 'block';
    return;
  }

  try {
    const snapshot = await db.collection('users').doc(profileUserId).collection('collections').get();

    if (snapshot.empty) {
      grid.innerHTML = '';
      empty.style.display = 'block';
    } else {
      empty.style.display = 'none';
      let html = '';
      for (const doc of snapshot.docs) {
        const col = doc.data();
        const count = (col.projectIds || []).length;
        html += `
          <div class="collection-card" onclick="viewCollection('${doc.id}')">
            <div class="collection-preview-grid">
              ${[0,1,2,3].map(i => `<div class="collection-preview-item" style="background: ${gradMap[['web','art','game','tool','ai'][i % 5]]};"></div>`).join('')}
            </div>
            <h4>${escapeHtml(col.name)}</h4>
            <p>${count} vibe${count !== 1 ? 's' : ''}</p>
          </div>`;
      }
      html += `
        <div class="collection-card" onclick="openSaveModal('')" style="display:flex;align-items:center;justify-content:center;min-height:180px;border-style:dashed;">
          <div style="text-align:center;color:var(--text-muted);">
            <div style="font-size:2rem;margin-bottom:8px;">+</div>
            <p>New Collection</p>
          </div>
        </div>`;
      grid.innerHTML = html;
    }
  } catch (e) {
    console.error('Load collections error:', e);
    grid.innerHTML = '';
    empty.style.display = 'block';
  }
}

async function viewCollection(collectionId) {
  // Could navigate to a collection detail page, for now show projects
  if (!currentUser || currentUser.uid !== profileUserId) return;

  try {
    const colDoc = await db.collection('users').doc(profileUserId).collection('collections').doc(collectionId).get();
    if (!colDoc.exists) return;
    const col = colDoc.data();
    const projectIds = col.projectIds || [];

    if (projectIds.length === 0) {
      showToast('This collection is empty');
      return;
    }

    // Switch to vibes tab and show collection projects
    switchProfileTab('vibes', document.querySelector('.profile-tab'));
    const grid = document.getElementById('profile-projects-grid');
    grid.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';

    // Load each project (limited to 10 at a time by Firestore 'in')
    const batch = projectIds.slice(0, 10);
    const snap = await db.collection('projects').where(firebase.firestore.FieldPath.documentId(), 'in', batch).get();
    const projects = snap.docs.map(doc => ({ id: doc.id, ...doc.data(), createdAt: doc.data().createdAt?.toDate() || new Date() }));

    grid.innerHTML = '<div style="margin-bottom:16px;display:flex;align-items:center;gap:12px;"><button class="btn btn-outline btn-sm" onclick="loadProfileProjects();document.querySelector(\'.profile-tab\').click();">&#8592; Back</button><h3 style="font-size:1.1rem;">' + escapeHtml(col.name) + '</h3></div>' + projects.map(p => renderProjectCard(p)).join('');
  } catch (e) {
    console.error('View collection error:', e);
  }
}

function switchProfileTab(tab, btn) {
  document.querySelectorAll('.profile-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  document.getElementById('tab-vibes').style.display = tab === 'vibes' ? 'block' : 'none';
  document.getElementById('tab-collections').style.display = tab === 'collections' ? 'block' : 'none';

  if (tab === 'collections') {
    loadProfileCollections();
  }
}

async function handleProfileFollow() {
  if (!requireAuth('follow creators')) return;
  const btn = document.getElementById('profile-follow-btn');
  await toggleFollow(profileUserId, btn);
}

// Wait for auth then load
window.addEventListener('authStateReady', () => {
  loadProfile();
});

// Fallback load
setTimeout(() => {
  if (!profileData) loadProfile();
}, 1500);
</script>
</body>
</html>
