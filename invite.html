<!-- Core UI -->
<script src="js/image-utils.js"></script>
<script src="js/shared.js"></script>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

<!-- App JS -->
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>

<script>
initPage('invite');

// Extract invite code from URL path: /invite/VIBE-XXXX
function getInviteCodeFromPath() {
  const path = window.location.pathname;
  const match = path.match(/^\/invite\/([A-Za-z0-9-]+)$/);
  return match ? match[1].toUpperCase() : null;
}

async function loadInviteLanding() {
  const code = getInviteCodeFromPath();
  if (!code) {
    showInviteError('No invite code found in the URL.');
    return;
  }

  try {
    // Look up the invite code
    const snapshot = await db.collection('inviteCodes')
      .where('code', '==', code)
      .limit(1)
      .get();

    if (snapshot.empty) {
      showInviteError('This invite code is not valid.');
      return;
    }

    const codeData = snapshot.docs[0].data();

    if (codeData.status === 'used') {
      showInviteError('This invite has already been claimed.');
      return;
    }

    // Check expiry
    if (codeData.expiresAt && codeData.expiresAt.toDate() < new Date()) {
      showInviteError('This invite has expired.');
      return;
    }

    // Show inviter info
    if (codeData.createdBy) {
      try {
        const inviterDoc = await db.collection('users').doc(codeData.createdBy).get();
        if (inviterDoc.exists) {
          const inviter = inviterDoc.data();
          const initial = (inviter.displayName || 'V')[0].toUpperCase();
          document.getElementById('invite-inviter').innerHTML = `
            <div class="inviter-avatar">
              ${inviter.photoURL ? '<img src="' + escapeHtml(inviter.photoURL) + '">' : initial}
            </div>
            <p><strong>${escapeHtml(inviter.displayName || 'A VibeLab creator')}</strong> invited you</p>
          `;
        }
      } catch (e) {
        // Silent fail — just don't show inviter info
      }
    }

    document.getElementById('invite-code-display').textContent = code;
    document.getElementById('invite-loading').style.display = 'none';
    document.getElementById('invite-content').style.display = 'block';

    // Store code for use in signup
    window._inviteLinkCode = code;
  } catch (e) {
    console.error('Invite landing error:', e);
    showInviteError('Something went wrong. Please try again.');
  }
}

function acceptInvite() {
  // switchAuthMode('signup') detects _inviteLinkCode and auto-verifies
  openAuthModal('signup');
}

function showInviteError(msg) {
  document.getElementById('invite-loading').style.display = 'none';
  document.getElementById('invite-error').style.display = 'block';
  document.getElementById('invite-error').innerHTML = `
    <div class="invite-error-card">
      <div style="font-size: 2.5rem; margin-bottom: 16px;">&#128274;</div>
      <h2>${escapeHtml(msg)}</h2>
      <p style="color: var(--text-muted); margin: 16px 0;">VibeLab is invite-only. Ask a member for an invite link!</p>
      <a href="/" class="btn btn-primary btn-sm">Go to Home</a>
    </div>
  `;
}

// If user is already logged in with a complete profile, redirect to explore
window.addEventListener('authStateReady', (e) => {
  if (e.detail.user && e.detail.profile?.username) {
    window.location.href = '/explore';
  }
});

loadInviteLanding();
</script>
